let deferredPrompt=null;
function setupPWA(){
  const manifest={
    name:'Casă — Finanțele familiei', short_name:'Casă', start_url:'.', display:'standalone',
    background_color:'#f4f6f5', theme_color:'#0d7a5f', description:'Gestionarea finanțelor familiei',
    icons:[{src:iconDataURL(192),sizes:'192x192',type:'image/png'},{src:iconDataURL(512),sizes:'512x512',type:'image/png'}]
  };
  try{
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
    const link=document.createElement('link'); link.rel='manifest'; link.href=URL.createObjectURL(blob);
    document.head.appendChild(link);
  }catch(e){}
  if('serviceWorker' in navigator && location.protocol.startsWith('http')){
    const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',()=>{});`;
    try{
      const b=new Blob([sw],{type:'text/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});
    }catch(e){}
  }
  window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; const b=$('#installBtn'); if(b) b.style.display=''; });
}
function iconDataURL(size){
  try{
    const c=document.createElement('canvas'); c.width=c.height=size; const x=c.getContext('2d');
    const g=x.createLinearGradient(0,0,size,size); g.addColorStop(0,'#0d7a5f'); g.addColorStop(1,'#095c47');
    x.fillStyle=g;
    if(x.roundRect){ const r=size*0.22; x.beginPath(); x.roundRect(0,0,size,size,r); x.fill(); }
    else x.fillRect(0,0,size,size);
    x.fillStyle='#fff'; x.font=`bold ${size*0.5}px Sora,sans-serif`; x.textAlign='center'; x.textBaseline='middle';
    x.fillText('C',size/2,size*0.54);
    return c.toDataURL('image/png');
  }catch(e){ return ''; }
}

/* stringify canonic (chei sortate) — diff stabil între obiectul local și ecoul serverului */
function canon(o){
  if(o===null||typeof o!=='object') return JSON.stringify(o===undefined?null:o);
  if(Array.isArray(o)) return '['+o.map(canon).join(',')+']';
  return '{'+Object.keys(o).filter(k=>o[k]!==undefined).sort().map(k=>JSON.stringify(k)+':'+canon(o[k])).join(',')+'}';
}

async function createFamily(){
  if(!Cloud.user) return;
  const btn=$('#famCreate'); if(btn){ btn.disabled=true; btn.textContent='Se creează…'; }
  try{
    const alpha='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code, tries=0;
    do{ code='CASA-'+Array.from({length:4},()=>alpha[Math.floor(Math.random()*alpha.length)]).join(''); tries++; }
    while(tries<8 && (await Cloud.db.collection('invites').doc(code).get()).exists);
    const fid = Cloud.db.collection('families').doc().id;
    const fam = Cloud.db.collection('families').doc(fid);
    const b = Cloud.db.batch();
    b.set(fam,{ inviteCode:code, owner:Cloud.user.uid, createdAt:Date.now(),
      members:{[Cloud.user.uid]:true},
      memberInfo:{[Cloud.user.uid]:{email:Cloud.user.email||'', who:Cloud.role}},
      users:DB.users, adults:DB.settings.adults??2, children:DB.settings.children??1 });
    b.set(Cloud.db.collection('invites').doc(code),{familyId:fid});
    b.set(Cloud.db.collection('userProfiles').doc(Cloud.user.uid),{familyId:fid, who:Cloud.role, email:Cloud.user.email||''});
    await b.commit();
    await migrateLocal(fid);
    Cloud.myWho=Cloud.role;
    hideEl('famScreen');
    startSync(fid);
    toast('Familie creată ✓ Cod invitație: '+code);
  }catch(e){ fsErr(e, true); }
  if(btn){ btn.disabled=false; btn.textContent='Creează familie nouă'; }
}

async function migrateLocal(fid){
  const fam=Cloud.db.collection('families').doc(fid);
  const ops=[];
  COLLS.forEach(c=> (DB[c]||[]).forEach(r=>{ if(r && r.id!=null) ops.push({c, id:String(r.id), d:JSON.parse(canon(r))}); }));
  for(let i=0;i<ops.length;i+=400){
    const b=Cloud.db.batch();
    ops.slice(i,i+400).forEach(o=> b.set(fam.collection(o.c).doc(o.id), o.d));
    await b.commit();
  }
}

  try{
    const inv=await Cloud.db.collection('invites').doc(code).get();
    if(!inv.exists){ toast('Cod inexistent — verifică-l cu partenerul','err'); btnReset(); return; }
    const fid=inv.data().familyId;
    await Cloud.db.collection('families').doc(fid).update({
      ['members.'+Cloud.user.uid]:true,
      ['memberInfo.'+Cloud.user.uid]:{email:Cloud.user.email||'', who:Cloud.role}
    });
    await Cloud.db.collection('userProfiles').doc(Cloud.user.uid).set({familyId:fid, who:Cloud.role, email:Cloud.user.email||''});
    Cloud.myWho=Cloud.role;
    hideEl('famScreen');
    startSync(fid);
    toast('Bine ai venit în familie ✓');
  }catch(e){ fsErr(e, true); }
  btnReset();
}

function startSync(fid){
  stopSync();
  Cloud.fid=fid; Cloud.active=true; Cloud.kicked=false;
  Cloud.last={}; COLLS.forEach(c=>Cloud.last[c]=new Map());
  Cloud.metaLast=null;
  const fam=Cloud.db.collection('families').doc(fid);
  Cloud.unsubs.push(fam.onSnapshot(s=>{
    if(!s.exists) return;
    const d=s.data();
    Cloud.inviteCode=d.inviteCode||'';
    if(d.users) DB.users=Object.assign({},DB.users,d.users);
    if(d.adults!=null) DB.settings.adults=d.adults;
    if(d.children!=null) DB.settings.children=d.children;
    Cloud.metaLast=canon({users:DB.users, adults:DB.settings.adults??2, children:DB.settings.children??1});
    const info=d.memberInfo||{};
    Cloud.owner=d.owner||null;
    Cloud.members=Object.keys(d.members||{}).map(uid=>({
      uid, email:(info[uid]&&info[uid].email)||'', who:(info[uid]&&info[uid].who)||'',
      me:uid===Cloud.user.uid, owner:uid===d.owner, canData:(info[uid]&&info[uid].canData)===true
    })).sort((a,b)=> (b.owner-a.owner)||(b.me-a.me));
    const mi=info[Cloud.user.uid];
    if(mi && mi.who) Cloud.myWho=mi.who;
    persistLocal(); renderNav(); render();
  }, syncErr));
  COLLS.forEach(c=>{
    Cloud.unsubs.push(fam.collection(c).onSnapshot(s=>{
      const arr=[]; const m=new Map();
      s.forEach(doc=>{ const r=doc.data(); r.id=doc.id; arr.push(r); m.set(doc.id, canon(r)); });
      DB[c]=arr; Cloud.last[c]=m;
      persistLocal(); renderNav(); render();
    }, syncErr));
  });
}
/* eroare pe listenerii familiei: permission-denied în timpul sincronizării = am fost scoși din familie */
function syncErr(e){
  if(e && e.code==='permission-denied' && Cloud.active){
    if(Cloud.kicked) return;
    Cloud.kicked=true;
    stopSync();
    Cloud.fid=null; Cloud.members=[]; Cloud.inviteCode=''; Cloud.myWho=null;
    try{ Cloud.db.collection('userProfiles').doc(Cloud.user.uid).set({familyId:null},{merge:true}); }catch(_){}
    toast('Nu mai ai acces la această familie','err');
    showFam();
    return;
  }
  fsErr(e);
}
async function removeMember(uid){
  if(!Cloud.active || Cloud.owner!==Cloud.user.uid || uid===Cloud.user.uid) return;
  const m=Cloud.members.find(x=>x.uid===uid);
  if(!confirm('Scoți din familie '+((m&&m.email)||'acest membru')+'?\nNu va mai putea vedea sau modifica datele.')) return;
  try{
    const del=firebase.firestore.FieldValue.delete();
    await Cloud.db.collection('families').doc(Cloud.fid).update({['members.'+uid]:del, ['memberInfo.'+uid]:del});
    toast('Membru scos din familie');
  }catch(e){ fsErr(e,true); }
}
async function toggleDataAccess(uid){
  if(!Cloud.active || Cloud.owner!==Cloud.user.uid || uid===Cloud.user.uid) return;
  const m=(Cloud.members||[]).find(x=>x.uid===uid); if(!m) return;
  const val=!m.canData;
  try{
    await Cloud.db.collection('families').doc(Cloud.fid).update({['memberInfo.'+uid+'.canData']:val});
    toast(val?'Acces la Date & backup acordat':'Acces la Date & backup retras');
  }catch(e){ fsErr(e,true); }
}
function stopSync(){ Cloud.unsubs.forEach(u=>{ try{u();}catch(e){} }); Cloud.unsubs=[]; Cloud.active=false; }

function schedulePush(){
  if(!Cloud.active) return;
  clearTimeout(Cloud.pushT);
  Cloud.pushT=setTimeout(()=>{ doPush().catch(fsErr); },350);
}
async function doPush(){
  if(!Cloud.active || !Cloud.fid) return;
  const fam=Cloud.db.collection('families').doc(Cloud.fid);
  const ops=[];
  COLLS.forEach(c=>{
    const cur=new Map();
    (DB[c]||[]).forEach(r=>{
      if(!r || r.id==null) return;
      const id=String(r.id), j=canon(r);
      cur.set(id,j);
      if(Cloud.last[c].get(id)!==j) ops.push({t:'set',c,id,j});
    });
    Cloud.last[c].forEach((j,id)=>{ if(!cur.has(id)) ops.push({t:'del',c,id}); });
  });
  const meta=canon({users:DB.users, adults:DB.settings.adults??2, children:DB.settings.children??1});
  const metaChanged = meta!==Cloud.metaLast;
  if(!ops.length && !metaChanged) return;
  // optimist: notează ca scrise — snapshot-urile readuc oricum adevărul serverului
  ops.forEach(o=>{ if(o.t==='set') Cloud.last[o.c].set(o.id,o.j); else Cloud.last[o.c].delete(o.id); });
  Cloud.metaLast=meta;
  const chunks=[]; for(let i=0;i<ops.length;i+=400) chunks.push(ops.slice(i,i+400));
  if(!chunks.length) chunks.push([]);
  for(let k=0;k<chunks.length;k++){
    const b=Cloud.db.batch();
    chunks[k].forEach(o=>{
      const ref=fam.collection(o.c).doc(o.id);
      if(o.t==='set') b.set(ref, JSON.parse(o.j)); else b.delete(ref);
    });
    if(k===0 && metaChanged) b.set(fam, JSON.parse(meta), {merge:true});
    await b.commit();
  }
}

function fsErr(e, interactive){
  const c=(e && e.code)||'';
  if(c==='permission-denied') toast('Acces refuzat — regulile de securitate nu sunt publicate în Firebase (Firestore → Rules)','err');
  else if(c==='unavailable'){ if(interactive) toast('Nu mă pot conecta la baza de date — verifică internetul sau adblock-ul','err'); /* altfel Firestore reia singur */ }
  else if(c==='failed-precondition'){ if(interactive) toast('Baza de date nu răspunde încă — reîncearcă în câteva secunde','err'); }
  else if(c) toast('Eroare cloud: '+c,'err');
  else if(e){ console.warn('cloud', e); if(interactive) toast('Eroare neașteptată — reîncearcă','err'); }
}
function authErr(e){
  const c=(e && e.code)||'';
  const m={
    'auth/invalid-email':'Email invalid',
    'auth/user-not-found':'Nu există cont cu acest email — apasă „Creează cont nou”',
    'auth/wrong-password':'Parolă greșită',
    'auth/invalid-credential':'Email sau parolă greșită',
    'auth/email-already-in-use':'Există deja un cont cu acest email — folosește „Conectare”',
    'auth/weak-password':'Parola trebuie să aibă minim 6 caractere',
    'auth/missing-password':'Scrie parola',
    'auth/too-many-requests':'Prea multe încercări — așteaptă un minut',
    'auth/network-request-failed':'Fără internet — încearcă din nou',
    'auth/popup-blocked':'Fereastra Google a fost blocată de browser — folosește email + parolă',
    'auth/popup-closed-by-user':'Ai închis fereastra Google înainte de finalizare',
    'auth/cancelled-popup-request':'Reîncearcă — o singură fereastră Google pe rând',
    'auth/unauthorized-domain':'Domeniul site-ului nu e autorizat în Firebase (Authentication → Settings → Authorized domains)'
  };
  toast(m[c] || ('Eroare: '+(e && e.message || c || 'necunoscută')),'err');
}

function wireAuth(){
  const L=$('#auLogin'), R=$('#auReg'), G=$('#auGoogle'), lo=$('#auLocal');
  if(!L || L.dataset.wired) return;
  L.dataset.wired='1';
  const creds=()=>({ email:($('#auEmail').value||'').trim(), pass:$('#auPass').value||'' });
  L.onclick=async()=>{ const {email,pass}=creds(); if(!email||!pass) return toast('Completează email și parolă','err');
    L.disabled=true; try{ await Cloud.auth.signInWithEmailAndPassword(email,pass); }catch(e){ authErr(e); } L.disabled=false; };
  R.onclick=async()=>{ const {email,pass}=creds(); if(!email||!pass) return toast('Completează email și parolă','err');
    R.disabled=true; try{ await Cloud.auth.createUserWithEmailAndPassword(email,pass); toast('Cont creat ✓'); }catch(e){ authErr(e); } R.disabled=false; };
  G.onclick=async()=>{ G.disabled=true; try{ await Cloud.auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }catch(e){ authErr(e); } G.disabled=false; };
  lo.onclick=()=>{ Store.set('casa_local_mode','1'); hideEl('authScreen');
    if(!DB.settings.seeded && DB.expenses.length===0){ seedDemo(); saveDB(); renderNav(); render(); } };
  $('#auPass').addEventListener('keydown',ev=>{ if(ev.key==='Enter') L.click(); });
  const rs=$('#roleSot'), rf=$('#roleSotie');
  const setRole=r=>{ Cloud.role=r; rs.setAttribute('data-on', r==='sot'?'1':'0'); rf.setAttribute('data-on', r==='sotie'?'1':'0'); };
  rs.onclick=()=>setRole('sot'); rf.onclick=()=>setRole('sotie');
  $('#famCreate').onclick=()=>createFamily();
  $('#famJoin').onclick=()=>joinFamily();
  $('#famCode').addEventListener('keydown',ev=>{ if(ev.key==='Enter') joinFamily(); });
  $('#famLogout').onclick=()=>{ if(Cloud.auth) Cloud.auth.signOut(); };
}

    <div class="set-desc" style="margin:0 2px 10px">Toate familiile care folosesc aplicația (vizibil doar pentru tine). Conturile create fără familie apar doar în consola Firebase → Authentication.</div>
    <button class="btn sm" data-action="loadadmin" style="margin-bottom:10px">Reîncarcă</button>
    <div id="adminList"><div style="padding:16px;color:var(--ink-4)"><span class="spin"></span> Se încarcă familiile…</div></div>`);

function hookSettings(){ if(isAdminUser() && state.openAcc && state.openAcc.admin) loadAdmin(); }
async function loadAdmin(){
  const box=$('#adminList'); if(!box || !isAdminUser() || !Cloud.db) return;
  box.innerHTML='<div style="padding:16px;color:var(--ink-4)"><span class="spin"></span> Se încarcă familiile…</div>';
  try{
    const snap=await Cloud.db.collection('families').get();
    const fams=[]; snap.forEach(dd=>fams.push({id:dd.id, ...dd.data()}));
    fams.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    Cloud.adminLoaded=true;
    if(!fams.length){ box.innerHTML='<div class="set-desc" style="padding:10px 2px">Nicio familie încă.</div>'; return; }
    const emails=new Set();
    const cards=fams.map(f=>{
      const info=f.memberInfo||{};
      const members=Object.keys(f.members||{}).map(uid=>{ const mi=info[uid]||{}; if(mi.email) emails.add((mi.email||'').toLowerCase()); return {uid, email:mi.email||'(fără email)', who:mi.who||'', owner:uid===f.owner, canData:mi.canData===true}; });
      const created=f.createdAt?new Date(f.createdAt).toLocaleDateString('ro-RO',{day:'numeric',month:'short',year:'numeric'}):'—';
      const nume = f.users? `${esc(f.users.sot||'Soț')} & ${esc(f.users.sotie||'Soție')}` : esc(f.id.slice(0,6));
      return `<div class="set-row" style="flex-direction:column;align-items:stretch;gap:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <b style="font-size:14px">${nume}</b>
          <span class="set-desc">${members.length} ${members.length===1?'membru':'membri'} · creată ${created}</span>
        </div>
        ${members.map(m=>`<div style="display:flex;gap:8px;align-items:center;font-size:13px">
          <span class="udot ${m.who==='sotie'?'u-sotie':m.who==='comun'?'u-comun':'u-sot'}"></span>
          <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.email)}</span>
          ${m.owner?'<span class="pill pos">creator</span>':''}${(m.owner||m.canData)?'<span class="chip" style="padding:1px 7px;font-size:10px">backup</span>':''}
        </div>`).join('')}
      </div>`;
    }).join('');
    box.innerHTML=`<div class="set-desc" style="margin:0 2px 10px"><b>${fams.length}</b> familii · <b>${emails.size}</b> conturi distincte cu familie</div><div class="set-group">${cards}</div>`;
  }catch(e){
    const c=(e&&e.code)||'';
    box.innerHTML=`<div class="set-desc" style="padding:12px 2px;color:var(--danger)">Nu am putut încărca${c==='permission-denied'?' — publică regulile actualizate în Firebase (Firestore → Rules), care includ accesul de administrator':' ('+(c||'eroare')+')'}.</div>`;
  }
}

/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  try{
    const raw=Store.get(DBKEY);
    if(raw){ try{ DB=normalizeDB(JSON.parse(raw)); }catch(e){ DB=defaultDB(); } }
    else DB=defaultDB();
    // demo-ul se populează doar în modul „fără cont”; cu sincronizare cloud pornești curat
    if(localMode() && !DB.settings.seeded && DB.expenses.length===0){ seedDemo(); saveDB(); }
    applyTheme();
    applyAnimBg();
    // pe tema Automat, urmărește live schimbările din sistem (zi/noapte)
    try{
      const mq=window.matchMedia('(prefers-color-scheme: dark)');
      const onSys=()=>{ if(currentTheme()==='auto'){ applyTheme(); render(); } };
      if(mq.addEventListener) mq.addEventListener('change',onSys); else if(mq.addListener) mq.addListener(onSys);
    }catch(e){}
    const ml=$('#monthLabel'); if(ml) ml.textContent=monthName(state.month);
    wireStatic();
    renderNav();
    const savedView = Store.get(VIEWKEY);
    go(TITLES[savedView] ? savedView : 'dashboard');
    if(DB.settings.pin){ showLock('unlock'); }
  }catch(e){ console.error('boot error', e); }
  finally{
    const app=$('#app'); if(app) app.classList.add('ready');  // dezvăluie mereu UI-ul
    try{ setupPWA(); }catch(e){ console.warn('pwa skipped', e); } // PWA nu blochează niciodată randarea
    // scripturile Firebase sunt defer → pornim cloud-ul când sunt gata; fără net, aplicația merge local
    try{ if(typeof firebase!=='undefined') initCloud(); else window.addEventListener('load', initCloud); }catch(e){ console.warn('cloud skipped', e); }
  }
}
// Scriptul e la finalul body-ului → DOM-ul de deasupra există deja; pornim imediat,
// fără să depindem de DOMContentLoaded (care poate întârzia după resurse externe lente).
boot();
// Dacă biblioteca de grafice se încarcă după boot (defer), redesenăm o singură dată.
if(typeof Chart==='undefined'){
  window.addEventListener('load', function(){
    if(typeof Chart!=='undefined'){ try{ render(); }catch(e){} }
  });
}
